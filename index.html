<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lua Land Security</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080809;--surface:#111115;--s2:#1a1a22;--border:rgba(255,255,255,0.1);--bf:rgba(255,255,255,0.45);--text:#eeeef5;--muted:#5a5a70;--accent:#a0a8ff;--danger:#e05555;--ok:#3ecf8e;--r:12px}
html,body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:40px 20px 80px}
.hdr{display:flex;align-items:center;gap:9px;margin-bottom:36px}
.hdr-title{font-family:'Share Tech Mono',monospace;font-size:1.25rem;letter-spacing:.06em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;gap:24px}
.field{display:flex;flex-direction:column;gap:7px}
.flabel{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
input[type=text],textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Sora',sans-serif;font-size:.88rem;padding:11px 13px;outline:none;transition:border-color .2s}
input[type=text]:focus,textarea:focus{border-color:var(--bf)}
textarea{min-height:120px;font-family:'Share Tech Mono',monospace;font-size:.8rem;resize:vertical}
.actions{display:flex;justify-content:space-between;gap:10px}
.btn{padding:10px 20px;border-radius:10px;font-family:'Sora',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:var(--text);color:var(--bg)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;max-width:400px;width:100%;display:flex;flex-direction:column;gap:14px}
.rbox{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:13px;font-family:'Share Tech Mono',monospace;font-size:.76rem;color:var(--ok);white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<div class="page">
  <div class="hdr"><span class="hdr-title">Lua Land Security</span></div>
  <div class="card">
    <div class="field"><span class="flabel">TITLE</span><input type="text" id="f-title" placeholder="Script Name"/></div>
    <div class="field"><span class="flabel">SCRIPT</span><textarea id="f-script"></textarea></div>
    <div class="field"><span class="flabel">KEY</span><input type="text" id="f-key" placeholder="Create a key..."/></div>
    <div class="actions"><button class="btn btn-primary" onclick="doSubmit()">Confirm & Generate</button></div>
  </div>
</div>

<div class="ov" id="m-done">
  <div class="modal">
    <h3>Generated!</h3>
    <div class="rbox" id="result-loader"></div>
    <button class="btn btn-primary" onclick="copyLoader()">Copy Loader</button>
  </div>
</div>

<script>
const WORKER_URL = "https://lua-land-sec.angelo-olavere64.workers.dev";
async function doSubmit(){
  const title=document.getElementById('f-title').value.trim();
  const script=document.getElementById('f-script').value.trim();
  const key=document.getElementById('f-key').value.trim();
  try {
    const res=await fetch(WORKER_URL+'/upload',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title,script,key})
    });
    const data=await res.json();
    if(data.id){
      const cleanURL=WORKER_URL+'/s/'+data.id;
      document.getElementById('result-loader').textContent=
        'local k = "' + key + '"\nlocal u = "' + cleanURL + '"\nlocal s, r = pcall(function() return game:HttpGetAsync(u, true, {["X-Access-Key"] = k}) end)\nif s then loadstring(r)() end';
      document.getElementById('m-done').classList.add('open');
    }
  } catch(err){ alert('Error'); }
}
function copyLoader(){
  navigator.clipboard.writeText(document.getElementById('result-loader').textContent).then(()=>alert('Copied!'));
}
</script>
</body>
</html>
